name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: |
          docker run --rm \
            -v "$(pwd):/work" -w /work \
            ghcr.io/realm/swiftlint:latest \
            swiftlint lint --reporter github-actions-logging

  # Runs on main push only — generates lcov coverage artifact for Sonar
  test:
    name: Test (macOS)
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Test with coverage
        run: swift test --enable-code-coverage --filter "ClipboardFolderCoreTests|ClipboardFolderUITests"
      - name: Generate coverage XML
        run: |
          PROFDATA=$(find .build -name "default.profdata" | head -1)
          TESTBIN=$(find .build -path "*.xctest/Contents/MacOS/ClipboardFolderPackageTests" | head -1)
          xcrun llvm-cov export \
            -format=lcov \
            -instr-profile="$PROFDATA" \
            "$TESTBIN" \
            --ignore-filename-regex='\.build|Tests' \
            > coverage.lcov
          python3 Scripts/lcov_to_sonarqube_xml.py coverage.lcov coverage.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 1

  # PR variant — approval-gated, no coverage needed
  test-pr:
    name: Test (macOS) [requires approval]
    runs-on: macos-latest
    if: github.event_name == 'pull_request'
    environment: macos-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Unit tests
        run: swift test --filter "ClipboardFolderCoreTests|ClipboardFolderUITests"

  # Runs on both push and PR:
  #   push to main  → waits for lint + test, scans with coverage
  #   PR            → waits for lint only (test is skipped), static scan only
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage artifact (main only)
        if: needs.test.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: .
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
