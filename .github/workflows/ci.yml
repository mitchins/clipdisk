name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Cheap Linux jobs — no build required, source analysis only
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        run: |
          docker run --rm \
            -v "$(pwd):/work" -w /work \
            ghcr.io/realm/swiftlint:latest \
            swiftlint lint --reporter github-actions-logging

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for accurate blame/history analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # macOS — automatic on merge to main, requires admin approval on PRs.
  # AppKit dependency blocks Linux compilation; revisit if core is ever split out.
  #
  # To enable on a PR: go to Actions → this run → approve the "macos-tests" environment.
  # Set up: Settings → Environments → macos-tests → add yourself as required reviewer.
  test:
    name: Test (macOS)
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Unit tests
        run: swift test --filter ClipboardFolderCoreTests

  test-pr:
    name: Test (macOS) [requires approval]
    runs-on: macos-latest
    if: github.event_name == 'pull_request'
    environment: macos-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Unit tests
        run: swift test --filter ClipboardFolderCoreTests
